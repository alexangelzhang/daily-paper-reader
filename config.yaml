github:
  owner: 'alexangelzhang'
  repo: daily-paper-reader
arxiv_paper_setting:
  mode: standard
  days_window: 9
  docs_dir: docs
  prefer_supabase_read: true
supabase:
  enabled: true
  url: https://lyucdwgefyfbmaiopjbk.supabase.co
  anon_key: sb_publishable_lX-oi64Uxyd7SIVv3_w2Uw_MTOojeKq
  papers_table: arxiv_papers
  use_vector_rpc: true
  vector_rpc: match_arxiv_papers
  vector_rpc_ann: match_arxiv_papers
  vector_rpc_exact: match_arxiv_papers_exact
  use_bm25_rpc: true
  bm25_rpc: match_arxiv_papers_bm25
  sync_table: arxiv_sync_status
  sync_success_value: success
  schema: public
subscriptions:
  schema_migration:
    stage: A
    diff_threshold_pct: 15
  keyword_recall_mode: or
  intent_profiles:
    - tag: 量化金融
      keywords:
        - keyword: quantitative finance
        - keyword: factor model
        - keyword: portfolio optimization
        - keyword: alpha signal
        - keyword: risk management
        - keyword: backtesting
      intent_queries:
        - query: quantitative finance factor investing and portfolio optimization
        - query: alpha signal generation and risk management in systematic trading
    - tag: AI Agent
      keywords:
        - keyword: AI agent
        - keyword: autonomous agent
        - keyword: LLM agent
        - keyword: tool use
        - keyword: multi-agent system
      intent_queries:
        - query: autonomous AI agent with tool use and reasoning capabilities
        - query: multi-agent collaboration and orchestration framework
